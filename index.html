<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動新聞：租屋寵物生存戰！</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
</head>
<body>

<div id="game-container">
    
    <!-- 開始畫面 -->
    <div id="start-screen" class="screen active">
        <h1>租屋寵物生存戰</h1>
        <p>成為一個盡責的飼主！<br>完成任務，別讓房東和鄰居抓狂！</p>
        <p>請選擇你要養的寵物：</p>
        <div class="pet-choice">
            <div class="pet-card" onclick="selectPet('cat')">
                <!-- 像素貓頭 -->
                <svg viewBox="0 0 16 16" class="pixel-icon"><path fill="#F39C12" d="M2 5h12v9H2z"/><path fill="#E67E22" d="M2 2h3v3H2zM11 2h3v3h-3z"/><rect x="4" y="8" width="2" height="2" fill="#000"/><rect x="10" y="8" width="2" height="2" fill="#000"/><rect x="7" y="11" width="2" height="1" fill="#E74C3C"/></svg>
                <br><span>貓派</span>
            </div>
            <div class="pet-card" onclick="selectPet('dog')">
                <!-- 像素狗頭 -->
                <svg viewBox="0 0 16 16" class="pixel-icon"><path fill="#D35400" d="M3 5h10v9H3z"/><path fill="#873600" d="M1 5h2v6H1zM13 5h2v6h-2z"/><rect x="5" y="8" width="2" height="2" fill="#000"/><rect x="9" y="8" width="2" height="2" fill="#000"/><rect x="7" y="11" width="2" height="2" fill="#333"/></svg>
                <br><span>狗派</span>
            </div>
        </div>
    </div>

    <!-- 簽署條款畫面 -->
    <div id="agreement-screen" class="screen">
        <h2>租屋寵物公約</h2>
        <!-- 像素貓掌印 -->
        <div id="selected-pet-icon">
            <svg viewBox="0 0 16 16" style="width:80px;height:80px;shape-rendering:crispEdges;"><path fill="#E74C3C" d="M3 4h3v3H3zM10 4h3v3h-3zM6 1h4v3H6zM4 9h8v5H4zM2 11h2v3H2zM12 11h2v3h-2z"/></svg>
        </div>
        <div class="contract-box">
            本人承諾入住後將盡責照顧所飼養之寵物，保持環境整潔、控制音量。若累積 <strong class="text-danger">3次</strong> 違規事項且未及時處理達 <strong class="text-danger">10秒</strong>，本人願無條件接受退租處分！
        </div>
        <button class="pixel-btn" onclick="startGame()">簽署並入住</button>
    </div>

    <!-- 遊戲畫面 -->
    <div id="play-screen" class="screen">
        <div id="ui-bar">
            <span>分數: <span id="score">0</span></span>
            <span id="status-icon">[室內]</span>
        </div>
        <div id="warning-timer">10</div>
        
        <div id="game-area">
            <!-- 背景層 (客廳或街道) -->
            <div id="scene-background" class="home-bg">
                <!-- 客廳專屬裝飾品 -->
                <div class="home-decor">
                    <!-- 像素窗戶 -->
                    <div class="pixel-window" style="position:absolute; top: 10%; left: 15%; width: 60px; height: 60px;">
                        <svg viewBox="0 0 16 16" style="shape-rendering:crispEdges; width:100%; height:100%;"><rect width="16" height="16" fill="#87CEEB"/><rect x="7" y="0" width="2" height="16" fill="#FFF"/><rect x="0" y="7" width="16" height="2" fill="#FFF"/><path d="M0 0h16v16H0z" fill="none" stroke="#6C4E31" stroke-width="2"/></svg>
                    </div>
                    <!-- 像素掛畫 -->
                    <div class="pixel-painting" style="position:absolute; top: 15%; right: 15%; width: 50px; height: 40px;">
                        <svg viewBox="0 0 16 16" style="shape-rendering:crispEdges; width:100%; height:100%;"><rect width="16" height="16" fill="#FFD166"/><path d="M0 0h16v16H0z" fill="none" stroke="#457B9D" stroke-width="2"/><rect x="4" y="4" width="8" height="8" fill="#118AB2"/><rect x="8" y="8" width="4" height="4" fill="#EF476F"/></svg>
                    </div>
                </div>
            </div>
            
            <!-- 寵物實體 -->
            <div id="pet-character"></div>
            
            <!-- 任務生成容器 -->
            <div id="task-container"></div>
        </div>
    </div>

    <!-- 遊戲結束畫面 -->
    <div id="game-over-screen" class="screen">
        <h1 class="text-danger">被趕出去了！</h1>
        <p>最終分數：<span id="final-score">0</span></p>
        <p>你因為以下原因被房東/管委會投訴：</p>
        <ul id="failure-reasons"></ul>
        <h2>你準備好當飼主了嗎？</h2>
        <button class="pixel-btn" onclick="resetToStart()">重新簽約</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
